<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockDropper</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Popup styles -->
    <link rel="stylesheet" href="popup.css" />
</head>

<body>
    <div id="container">
        <!-- 標題列 -->
        <div class="header">
            <h1>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />
                </svg>
                BlockDropper
            </h1>
            <a href="https://github.com/LonghiTW/BlockDropper" target="_blank" class="source-link">Source Code on GitHub</a>
        </div>

        <div class="content">
            <!-- 顏色輸入與 Hex 顯示 -->
            <div id="inputContainer">
                <div class="color-picker-wrapper">
                    <input type="color" id="input" />
                </div>
                <div id="hexValue"></div>
            </div>

            <!-- 模式選擇按鈕 (分段控制器風格) -->
            <div id="colorModeButtons">
                <button id="rgbButton">RGB</button>
                <button id="hslButton">HSL</button>
                <button id="hsvButton">HSV</button>
            </div>

            <!-- 數值拉桿區 -->
            <div id="sliderContainer">
                <!-- X Axis -->
                <div class="slider-row">
                    <label for="xSlider">R</label>
                    <input type="range" id="xSlider" class="slider-r" min="0" max="255" value="0" />
                    <input type="number" id="xValue" min="0" max="255" value="0" />
                </div>

                <!-- Y Axis -->
                <div class="slider-row">
                    <label for="ySlider">G</label>
                    <input type="range" id="ySlider" class="slider-g" min="0" max="255" value="0" />
                    <input type="number" id="yValue" min="0" max="255" value="0" />
                </div>

                <!-- Z Axis -->
                <div class="slider-row">
                    <label for="zSlider">B</label>
                    <input type="range" id="zSlider" class="slider-b" min="0" max="255" value="0" />
                    <input type="number" id="zValue" min="0" max="255" value="0" />
                </div>
            </div>

            <div class="divider"></div>

            <!-- 結果顯示區 -->
            <div id="result">
                <!-- Block 結果 -->
                <div class="section-title">Blocks</div>
                <div id="blocksResult" class="grid-result"></div>

                <div class="divider" style="margin: 15px 0;"></div>

                <!-- Decoration 結果 -->
                <div class="section-title">Decorations</div>
                
                <!-- Decoration 過濾按鈕 -->
                <div id="decorationFilters">
                    <button
                        id="verticalFilter"
                        class="filter-button"
                        data-filter-mode="none"
                        data-tag="vertical"
                    >
                        Vertical
                    </button>

                    <button
                        id="horizontalFilter"
                        class="filter-button"
                        data-filter-mode="none"
                        data-tag="horizontal"
                    >
                        Horizontal
                    </button>

                    <button
                        id="translucentFilter"
                        class="filter-button"
                        data-filter-mode="none"
                        data-tag="translucent"
                    >
                        Translucent
                    </button>
                </div>

                <div id="decorationResult" class="grid-result"></div>
            </div>

            <!-- 保留欄位 (備用) -->
            <div id="pickedList"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../utils.js"></script>
    <script type="module" src="popup.js"></script>
</body>
</html>
